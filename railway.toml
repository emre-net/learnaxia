[build]
builder = "nixpacks"
buildCommand = "npm run build -w web && cp -r apps/web/public apps/web/.next/standalone/apps/web/public && mkdir -p apps/web/.next/standalone/apps/web/.next && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static"
installCommand = "npm ci --legacy-peer-deps"

[deploy]
preDeployCommand = "cd apps/web && npx prisma migrate deploy"
startCommand = "HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"
restartPolicyType = "ON_FAILURE"
